name: terraform-pr

on:
  pull_request:

permissions:
  contents: read
  id-token: write

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
      target_count: ${{ steps.discover.outputs.target_count }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Collect changed files
        id: changes
        run: |
          set -euo pipefail
          git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}" > changed-files.txt
          echo "changed_count=$(grep -c . changed-files.txt || true)" >> "$GITHUB_OUTPUT"

      - name: Discover Terraform stacks
        id: discover
        run: |
          set -euo pipefail
          matrix_json="$(python3 ./scripts/discover_terraform_targets.py list-targets --changed-files-from changed-files.txt --json)"
          target_count="$(python3 -c 'import json,sys; print(len(json.loads(sys.argv[1])))' "$matrix_json")"
          {
            echo 'matrix<<EOF'
            echo "$matrix_json"
            echo 'EOF'
            echo "target_count=$target_count"
          } >> "$GITHUB_OUTPUT"

      - name: Publish discovery summary
        run: |
          python3 ./scripts/discover_terraform_targets.py render-summary \
            --changed-files-from changed-files.txt >> "$GITHUB_STEP_SUMMARY"

  plan:
    name: plan (${{ matrix.target.label }})
    needs: discover
    if: needs.discover.outputs.target_count != '0'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJson(needs.discover.outputs.matrix) }}
    defaults:
      run:
        shell: bash
        working-directory: .
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8
          terraform_wrapper: false

      - name: Terraform init
        run: terraform -chdir="${{ matrix.target.stack_path }}" init -reconfigure -backend-config=backend-vars/${{ matrix.target.env }}.tfvars

      - name: Terraform fmt
        run: terraform -chdir="${{ matrix.target.stack_path }}" fmt -check -recursive

      - name: Terraform validate
        run: terraform -chdir="${{ matrix.target.stack_path }}" validate

      - name: Terraform plan
        run: |
          set -o pipefail
          terraform -chdir="${{ matrix.target.stack_path }}" plan -input=false -no-color -var-file=tfvars/${{ matrix.target.env }}.tfvars -out=tfplan 2>&1 | tee "${{ matrix.target.stack_path }}/terraform-plan.log"

      - name: Upload Terraform plan log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: terraform-pr-plan-log-${{ matrix.target.id }}
          path: ${{ matrix.target.stack_path }}/terraform-plan.log
