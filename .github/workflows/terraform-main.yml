name: terraform-main

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
      target_count: ${{ steps.discover.outputs.target_count }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Collect changed files
        id: changes
        run: |
          set -euo pipefail
          if [ -z "${{ github.event.before }}" ] || [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            git ls-files > changed-files.txt
          else
            git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" > changed-files.txt
          fi
          echo "changed_count=$(grep -c . changed-files.txt || true)" >> "$GITHUB_OUTPUT"

      - name: Discover Terraform stacks
        id: discover
        run: |
          set -euo pipefail
          matrix_json="$(python3 ./scripts/discover_terraform_targets.py list-targets --changed-files-from changed-files.txt --json)"
          target_count="$(python3 -c 'import json,sys; print(len(json.loads(sys.argv[1])))' "$matrix_json")"
          {
            echo 'matrix<<EOF'
            echo "$matrix_json"
            echo 'EOF'
            echo "target_count=$target_count"
          } >> "$GITHUB_OUTPUT"

      - name: Publish discovery summary
        run: |
          {
            echo "## Terraform target discovery"
            echo
            echo "Changed files: ${{ steps.changes.outputs.changed_count }}"
            echo "Selected targets: ${{ steps.discover.outputs.target_count }}"
            echo
            echo '```json'
            python3 ./scripts/discover_terraform_targets.py list-targets --changed-files-from changed-files.txt --json
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  plan:
    name: plan (${{ matrix.target.label }})
    needs: discover
    if: needs.discover.outputs.target_count != '0'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJson(needs.discover.outputs.matrix) }}
    defaults:
      run:
        shell: bash
        working-directory: .
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8
          terraform_wrapper: false

      - name: Terraform init
        run: terraform -chdir="${{ matrix.target.stack_path }}" init -reconfigure -backend-config=backend-vars/${{ matrix.target.env }}.tfvars

      - name: Terraform fmt
        run: terraform -chdir="${{ matrix.target.stack_path }}" fmt -check -recursive

      - name: Terraform validate
        run: terraform -chdir="${{ matrix.target.stack_path }}" validate

      - name: Terraform plan
        run: |
          set -o pipefail
          terraform -chdir="${{ matrix.target.stack_path }}" plan -input=false -no-color -var-file=tfvars/${{ matrix.target.env }}.tfvars -out=tfplan 2>&1 | tee "${{ matrix.target.stack_path }}/terraform-plan.log"

      - name: Render Terraform plan
        run: terraform -chdir="${{ matrix.target.stack_path }}" show -no-color tfplan > "${{ matrix.target.stack_path }}/tfplan.txt"

      - name: Publish Terraform plan summary
        run: |
          {
            echo "## Terraform plan - ${{ matrix.target.label }}"
            echo
            echo "Preview of the generated plan before deployment approval."
            echo
            echo '```'
            sed -n '1,300p' "${{ matrix.target.stack_path }}/tfplan.txt"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Terraform plan
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-${{ matrix.target.id }}
          path: ${{ matrix.target.stack_path }}/tfplan

      - name: Upload readable Terraform plan
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-text-${{ matrix.target.id }}
          path: ${{ matrix.target.stack_path }}/tfplan.txt

      - name: Upload Terraform plan log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: terraform-main-plan-log-${{ matrix.target.id }}
          path: ${{ matrix.target.stack_path }}/terraform-plan.log

  apply:
    name: apply (${{ matrix.target.label }})
    needs: [discover, plan]
    if: needs.discover.outputs.target_count != '0'
    environment: cicd
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJson(needs.discover.outputs.matrix) }}
    defaults:
      run:
        shell: bash
        working-directory: .
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8
          terraform_wrapper: false

      - name: Download Terraform plan
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan-${{ matrix.target.id }}
          path: ${{ matrix.target.stack_path }}

      - name: Terraform init
        run: terraform -chdir="${{ matrix.target.stack_path }}" init -reconfigure -backend-config=backend-vars/${{ matrix.target.env }}.tfvars

      - name: Terraform apply
        run: |
          set -o pipefail
          terraform -chdir="${{ matrix.target.stack_path }}" apply -input=false -auto-approve tfplan 2>&1 | tee "${{ matrix.target.stack_path }}/terraform-apply.log"

      - name: Upload Terraform apply log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: terraform-apply-log-${{ matrix.target.id }}
          path: ${{ matrix.target.stack_path }}/terraform-apply.log
