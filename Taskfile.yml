# https://taskfile.dev
version: "3"

tasks:
  init:
    desc: "Init — usage: task init ENV=<env> [COMPONENT=<stack>]"
    requires:
      vars: [ENV]
    cmds:
      - |
        set -euo pipefail
        STACK_PATH="$(python3 ./scripts/discover_terraform_targets.py resolve-stack "${COMPONENT:-}")"
        terraform -chdir="$STACK_PATH" init -reconfigure -backend-config=backend-vars/{{.ENV}}.tfvars

  plan:
    desc: "Init + plan — usage: task plan ENV=<env> [COMPONENT=<stack>]"
    requires:
      vars: [ENV]
    cmds:
      - task: init
        vars: { ENV: "{{.ENV}}" }
      - |
        set -euo pipefail
        STACK_PATH="$(python3 ./scripts/discover_terraform_targets.py resolve-stack "${COMPONENT:-}")"
        terraform -chdir="$STACK_PATH" plan -var-file=tfvars/{{.ENV}}.tfvars

  apply:
    desc: "Init + apply — usage: task apply ENV=<env> [COMPONENT=<stack>]"
    requires:
      vars: [ENV]
    cmds:
      - task: init
        vars: { ENV: "{{.ENV}}" }
      - |
        set -euo pipefail
        STACK_PATH="$(python3 ./scripts/discover_terraform_targets.py resolve-stack "${COMPONENT:-}")"
        terraform -chdir="$STACK_PATH" apply -var-file=tfvars/{{.ENV}}.tfvars

  destroy:
    desc: "Init + destroy — usage: task destroy ENV=<env> [COMPONENT=<stack>]"
    requires:
      vars: [ENV]
    cmds:
      - task: init
        vars: { ENV: "{{.ENV}}" }
      - |
        set -euo pipefail
        STACK_PATH="$(python3 ./scripts/discover_terraform_targets.py resolve-stack "${COMPONENT:-}")"
        terraform -chdir="$STACK_PATH" destroy -var-file=tfvars/{{.ENV}}.tfvars

  output:
    desc: "Init + output — usage: task output ENV=<env> [COMPONENT=<stack>]"
    requires:
      vars: [ENV]
    cmds:
      - task: init
        vars: { ENV: "{{.ENV}}" }
      - |
        set -euo pipefail
        STACK_PATH="$(python3 ./scripts/discover_terraform_targets.py resolve-stack "${COMPONENT:-}")"
        terraform -chdir="$STACK_PATH" output

  envs:
    desc: "List available environments for the selected or default stack"
    cmds:
      - |
        set -euo pipefail
        python3 ./scripts/discover_terraform_targets.py list-envs --stack "${COMPONENT:-}"

  stacks:
    desc: "List available Terraform stacks under test_cicd"
    cmds:
      - python3 ./scripts/discover_terraform_targets.py list-stacks

  targets:
    desc: "List stack/environment targets discovered from tfvars and backend-vars"
    cmds:
      - python3 ./scripts/discover_terraform_targets.py list-targets
